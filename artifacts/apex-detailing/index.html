    <style>
      html, body { background: #050505; margin: 0; }
      #app-loading {
        position: fixed; inset: 0;
        display: flex; align-items: center; justify-content: center;
        background:
          radial-gradient(ellipse 70% 50% at 50% 45%, rgba(255, 26, 216, 0.12), transparent 60%),
          #050505;
        font-family: 'Mulish', system-ui, -apple-system, sans-serif;
        z-index: 9999;
        overflow: hidden;
      }
      #app-loading .logo-stage {
        position: relative;
        width: min(42vw, 180px);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #app-loading .logo-loader {
        position: relative;
        z-index: 2;
        width: 100%;
        height: auto;
        display: block;
        animation: logo-blink 1.4s ease-in-out infinite;
        filter: drop-shadow(0 0 12px rgba(255, 26, 216, 0.55))
                drop-shadow(0 0 28px rgba(0, 229, 255, 0.35));
      }
      #app-loading .loader-bubbles {
        position: absolute;
        inset: -20% -30% -5%;
        z-index: 1;
        pointer-events: none;
        overflow: visible;
      }
      #app-loading .loader-bubble {
        position: absolute;
        bottom: 18%;
        left: 50%;
        border-radius: 50%;
        border: 1px solid rgba(255, 255, 255, 0.22);
        background:
          radial-gradient(circle at 30% 28%, rgba(255, 255, 255, 0.55), transparent 42%),
          radial-gradient(circle at 70% 70%, rgba(0, 229, 255, 0.25), transparent 55%),
          radial-gradient(circle at 50% 50%, rgba(255, 26, 216, 0.18), rgba(157, 0, 255, 0.08) 60%, transparent 75%);
        box-shadow:
          0 0 8px rgba(255, 26, 216, 0.35),
          0 0 14px rgba(0, 229, 255, 0.2),
          inset 0 0 6px rgba(255, 255, 255, 0.25);
        opacity: 0;
        animation: loader-bubble-rise var(--dur, 3.2s) ease-out infinite;
        animation-delay: var(--delay, 0s);
        width: var(--size, 12px);
        height: var(--size, 12px);
        margin-left: calc(var(--size, 12px) / -2);
        --drift: 0px;
      }
      #app-loading .loader-bubble::before {
        content: "";
        position: absolute;
        top: 16%;
        left: 18%;
        width: 38%;
        height: 38%;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(255, 255, 255, 0.7), transparent 70%);
      }
      @keyframes loader-bubble-rise {
        0% {
          opacity: 0;
          transform: translate(0, 10px) scale(0.4);
        }
        12% {
          opacity: 0.9;
        }
        70% {
          opacity: 0.65;
        }
        100% {
          opacity: 0;
          transform: translate(var(--drift), -220px) scale(1.15);
        }
      }
      @keyframes logo-blink {
        0%, 100% {
          opacity: 0.35;
          transform: scale(0.96);
          filter: drop-shadow(0 0 6px rgba(255, 26, 216, 0.25))
                  drop-shadow(0 0 10px rgba(0, 229, 255, 0.15));
        }
        45% {
          opacity: 1;
          transform: scale(1.04);
          filter: drop-shadow(0 0 18px rgba(255, 26, 216, 0.85))
                  drop-shadow(0 0 36px rgba(0, 229, 255, 0.55))
                  drop-shadow(0 0 56px rgba(157, 0, 255, 0.35));
        }
        55% {
          opacity: 1;
          transform: scale(1.04);
          filter: drop-shadow(0 0 18px rgba(255, 26, 216, 0.85))
                  drop-shadow(0 0 36px rgba(0, 229, 255, 0.55));
        }
      }
    </style>
