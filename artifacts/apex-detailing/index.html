    <script>
      // Admin PWA bootstrap — must run before paint
      (function () {
        var path = (window.location.pathname || "/").replace(/\/$/, "") || "/";
        var params = new URLSearchParams(window.location.search || "");
        var standalone =
          window.matchMedia("(display-mode: standalone)").matches ||
          window.matchMedia("(display-mode: fullscreen)").matches ||
          window.matchMedia("(display-mode: minimal-ui)").matches ||
          window.navigator.standalone === true;

        function cookieHasAdmin() {
          return /(?:^|; )apex_pwa_start=admin(?:;|$)/.test(document.cookie);
        }

        var wantAdmin = false;
        try {
          wantAdmin = localStorage.getItem("apex_pwa_start") === "admin";
        } catch (e) {}
        if (params.get("pwa") === "admin" || cookieHasAdmin()) wantAdmin = true;

        if (path === "/admin" || path === "/go-admin.html" || wantAdmin) {
          try {
            localStorage.setItem("apex_pwa_start", "admin");
          } catch (e) {}
          document.cookie =
            "apex_pwa_start=admin; Domain=.apexdetailing.net; Path=/; Max-Age=31536000; SameSite=Lax; Secure";
          wantAdmin = true;
        }

        // iOS often ignores manifest start_url and opens "/". If this web app
        // was enabled for Admin, bounce standalone launches into /admin.
        if (standalone && wantAdmin && path !== "/admin" && path !== "/go-admin.html") {
          window.location.replace("/admin");
          return;
        }

        if (path === "/admin") {
          var link = document.getElementById("pwa-manifest");
          if (link) link.setAttribute("href", "/admin.webmanifest");
          var apple = document.querySelector('meta[name="apple-mobile-web-app-title"]');
          if (apple) apple.setAttribute("content", "Apex Admin");
          var app = document.querySelector('meta[name="application-name"]');
          if (app) app.setAttribute("content", "Apex Admin");
        }
      })();
    </script>

    <style>
      html, body { background: #050505; margin: 0; }
      #app-loading {
        position: fixed; inset: 0;
        display: flex; align-items: center; justify-content: center;
        background:
          radial-gradient(ellipse 70% 50% at 50% 45%, rgba(255, 26, 216, 0.14), transparent 60%),
          radial-gradient(ellipse 50% 40% at 80% 80%, rgba(0, 229, 255, 0.06), transparent 55%),
          #050505;
        font-family: 'Mulish', system-ui, -apple-system, sans-serif;
        z-index: 9999;
        overflow: hidden;
        contain: layout paint;
        opacity: 1;
        transition: opacity 0.4s ease;
      }
      #app-loading.is-done {
        opacity: 0;
        pointer-events: none;
      }
      #app-loading .logo-stage {
        position: relative;
        z-index: 3;
        width: min(46vw, 180px);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #app-loading .logo-loader {
        position: relative;
        z-index: 2;
        width: 100%;
        height: auto;
        display: block;
        opacity: 0;
        animation: none;
        filter: drop-shadow(0 0 14px rgba(255, 26, 216, 0.5));
        will-change: transform, opacity, filter;
      }
      #app-loading .logo-loader.is-ready {
        opacity: 1;
        animation: logo-blink 1.4s ease-in-out infinite;
      }
      /* Full-page bubble field */
      #app-loading .loader-field {
        position: absolute;
        inset: 0;
        z-index: 1;
        pointer-events: none;
        overflow: hidden;
      }
      #app-loading .loader-bubble {
        position: absolute;
        left: var(--x, 50%);
        bottom: var(--y, -5%);
        width: var(--size, 12px);
        height: var(--size, 12px);
        margin-left: calc(var(--size, 12px) / -2);
        border-radius: 50%;
        border: 1px solid rgba(255, 255, 255, 0.25);
        background:
          radial-gradient(circle at 30% 28%, rgba(255, 255, 255, 0.65), transparent 40%),
          radial-gradient(circle at 70% 72%, rgba(0, 229, 255, 0.35), transparent 55%),
          radial-gradient(circle at 50% 50%, rgba(255, 26, 216, 0.28), rgba(157, 0, 255, 0.12) 55%, transparent 78%);
        box-shadow: 0 0 12px rgba(255, 26, 216, 0.4);
        opacity: 0;
        animation: loader-bubble-fly var(--dur, 4s) var(--ease, ease-out) infinite;
        animation-delay: var(--delay, 0s);
        will-change: transform, opacity;
        contain: strict;
        --drift: 0px;
        --rise: -110vh;
        --spin: 0deg;
      }
      #app-loading .loader-bubble.pink {
        background:
          radial-gradient(circle at 30% 28%, rgba(255, 255, 255, 0.7), transparent 40%),
          radial-gradient(circle at 50% 50%, rgba(255, 26, 216, 0.4), rgba(255, 26, 216, 0.05) 70%, transparent);
        box-shadow: 0 0 12px rgba(255, 26, 216, 0.5);
      }
      #app-loading .loader-bubble.cyan {
        background:
          radial-gradient(circle at 30% 28%, rgba(255, 255, 255, 0.7), transparent 40%),
          radial-gradient(circle at 50% 50%, rgba(0, 229, 255, 0.4), rgba(0, 229, 255, 0.05) 70%, transparent);
        box-shadow: 0 0 12px rgba(0, 229, 255, 0.5);
      }
      @keyframes loader-bubble-fly {
        0% {
          opacity: 0;
          transform: translate3d(0, 12px, 0) scale(0.35) rotate(0deg);
        }
        8% {
          opacity: 0.95;
        }
        50% {
          opacity: 0.75;
          transform: translate3d(calc(var(--drift) * 0.55), calc(var(--rise) * 0.5), 0) scale(1) rotate(calc(var(--spin) * 0.5));
        }
        100% {
          opacity: 0;
          transform: translate3d(var(--drift), var(--rise), 0) scale(1.25) rotate(var(--spin));
        }
      }
      @keyframes logo-blink {
        0%, 100% {
          opacity: 0.85;
          transform: scale(0.98);
          filter: drop-shadow(0 0 10px rgba(255, 26, 216, 0.4));
        }
        45%, 55% {
          opacity: 1;
          transform: scale(1.04);
          filter: drop-shadow(0 0 18px rgba(255, 26, 216, 0.7));
        }
      }

      /* Mobile: keep logo readable, keep bubble field dense + bright */
      @media (max-width: 640px) {
        #app-loading .logo-stage {
          width: min(52vw, 140px);
        }
        #app-loading .logo-loader.is-ready {
          filter: drop-shadow(0 0 10px rgba(255, 26, 216, 0.5));
          animation-duration: 1.6s;
        }
        #app-loading .loader-bubble {
          border-width: 1px;
          border-color: rgba(255, 255, 255, 0.35);
          box-shadow: 0 0 12px rgba(255, 26, 216, 0.45);
        }
        #app-loading .loader-bubble.pink {
          box-shadow: 0 0 12px rgba(255, 26, 216, 0.5);
        }
        #app-loading .loader-bubble.cyan {
          box-shadow: 0 0 12px rgba(0, 229, 255, 0.5);
        }
        @keyframes loader-bubble-fly {
          0% {
            opacity: 0;
            transform: translate3d(0, 12px, 0) scale(0.35) rotate(0deg);
          }
          8% {
            opacity: 1;
          }
          50% {
            opacity: 0.85;
            transform: translate3d(calc(var(--drift) * 0.55), calc(var(--rise) * 0.5), 0) scale(1) rotate(calc(var(--spin) * 0.5));
          }
          100% {
            opacity: 0;
            transform: translate3d(var(--drift), var(--rise), 0) scale(1.25) rotate(var(--spin));
          }
        }
        @keyframes logo-blink {
          0%, 100% {
            opacity: 0.88;
            transform: scale(0.98);
            filter: drop-shadow(0 0 8px rgba(255, 26, 216, 0.4));
          }
          45%, 55% {
            opacity: 1;
            transform: scale(1.03);
            filter: drop-shadow(0 0 14px rgba(255, 26, 216, 0.65));
          }
        }
      }

      @media (prefers-reduced-motion: reduce) {
        #app-loading .logo-loader.is-ready {
          animation: none;
          opacity: 1;
          filter: drop-shadow(0 0 12px rgba(255, 26, 216, 0.5));
        }
        #app-loading .loader-bubble {
          animation: none !important;
          opacity: 0.35;
          transform: none;
        }
      }
    </style>
  </head>
  <body>
    <!-- Outside #root so React mount does not tear down the splash mid-load -->
    <div id="app-loading" aria-busy="true" aria-live="polite">
      <div class="loader-field" id="loader-field" aria-hidden="true"></div>
        <div class="logo-stage">
          <picture>
            <source srcset="/images/logo-splash.webp" type="image/webp" />
            <img
              class="logo-loader"
              id="splash-logo"
              src="/images/logo-splash.png"
              alt="Apex Detailing"
              width="180"
              height="210"
              decoding="sync"
              fetchpriority="high"
            />
          </picture>
        </div>
    </div>
    <div id="root"></div>
    <script>
      (function () {
        var field = document.getElementById("loader-field");
        if (field) {
          var reduce = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
          var mobile = window.matchMedia("(max-width: 640px)").matches;
          var count = reduce ? 8 : mobile ? 48 : 56;
          var frag = document.createDocumentFragment();
          for (var i = 0; i < count; i++) {
            var el = document.createElement("span");
            var size = mobile
              ? 8 + Math.random() * 24
              : 8 + Math.random() * 28;
            var fromLogo = Math.random() < (mobile ? 0.4 : 0.45);
            var x = fromLogo
              ? 42 + Math.random() * 16
              : Math.random() * 100;
            var y = fromLogo
              ? 38 + Math.random() * 18
              : -8 - Math.random() * 20;
            var drift = (Math.random() - 0.5) * (mobile ? 160 : 220);
            var rise = mobile ? -(80 + Math.random() * 55) : -(85 + Math.random() * 50);
            var dur = 2.2 + Math.random() * (mobile ? 2.8 : 3.4);
            var delay = -Math.random() * (mobile ? 2.8 : 4.5);
            var tone = Math.random();
            el.className = "loader-bubble" + (tone < 0.34 ? " pink" : tone < 0.68 ? " cyan" : "");
            el.style.setProperty("--size", size.toFixed(1) + "px");
            el.style.setProperty("--x", x.toFixed(2) + "%");
            el.style.setProperty("--y", y.toFixed(2) + "%");
            el.style.setProperty("--drift", drift.toFixed(1) + "px");
            el.style.setProperty("--rise", rise.toFixed(1) + "vh");
            el.style.setProperty("--dur", dur.toFixed(2) + "s");
            el.style.setProperty("--delay", delay.toFixed(2) + "s");
            el.style.setProperty("--spin", ((Math.random() - 0.5) * 160).toFixed(0) + "deg");
            frag.appendChild(el);
          }
          field.appendChild(frag);
        }

        // Keep splash until: logo decoded + app mounted + short minimum time
        var splash = document.getElementById("app-loading");
        var logo = document.getElementById("splash-logo");
        var logoReady = false;
        var appReady = false;
        var minTimeDone = false;
        var dismissed = false;

        function dismiss() {
          if (dismissed || !splash) return;
          if (!logoReady || !appReady || !minTimeDone) return;
          dismissed = true;
          splash.classList.add("is-done");
          splash.setAttribute("aria-busy", "false");
          window.setTimeout(function () {
            if (splash && splash.parentNode) splash.parentNode.removeChild(splash);
          }, 420);
        }

        function markLogoReady() {
          logoReady = true;
          if (logo) logo.classList.add("is-ready");
          dismiss();
        }

        if (logo) {
          if (logo.complete && logo.naturalWidth > 0) {
            markLogoReady();
          } else {
            logo.addEventListener("load", markLogoReady, { once: true });
            logo.addEventListener("error", markLogoReady, { once: true });
          }
        } else {
          logoReady = true;
        }

        window.setTimeout(function () {
          minTimeDone = true;
          dismiss();
        }, 700);

        // Hard cap so a hung asset never blocks the site
        window.setTimeout(function () {
          logoReady = true;
          appReady = true;
          minTimeDone = true;
          if (logo) logo.classList.add("is-ready");
          dismiss();
        }, 4500);

        window.__APEX_MARK_APP_READY__ = function () {
          appReady = true;
          dismiss();
        };
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
